<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tommy's Gift Website</title>
  <meta name="description" content="A hosted collection of Tommy's birthday gift pages with back and forward navigation.">
  <style>
    :root {
      color-scheme: light;
      --bg: #fff4f8;
      --panel: rgba(255, 255, 255, 0.9);
      --ink: #6d2448;
      --muted: #a96182;
      --accent: #df5f96;
      --accent-dark: #b83268;
      --ring: rgba(216, 83, 137, 0.22);
      --shadow: 0 18px 60px rgba(128, 38, 82, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 184, 213, 0.48), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(255, 222, 235, 0.95), transparent 30rem),
        var(--bg);
      color: var(--ink);
    }

    body {
      display: flex;
      flex-direction: column;
      padding: clamp(0.75rem, 2vw, 1.5rem);
      gap: 1rem;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(68vh, 1fr);
      gap: 1rem;
      flex: 1;
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(0.85rem, 2vw, 1.25rem);
      backdrop-filter: blur(18px);
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 0.25rem;
      color: var(--accent-dark);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1.05;
    }

    .page-meta {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.65rem;
    }

    button,
    .open-link {
      appearance: none;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      padding: 0.78rem 1rem;
      box-shadow: 0 10px 24px rgba(184, 50, 104, 0.25);
    }

    button:hover,
    .open-link:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    .open-link:focus-visible,
    select:focus-visible {
      outline: 4px solid var(--ring);
      outline-offset: 2px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
      box-shadow: none;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      background: #fff;
      color: var(--accent-dark);
      border: 1px solid #f3bfd4;
      padding: 0.72rem 0.95rem;
    }

    select {
      width: min(100%, 340px);
      border: 1px solid #f1bfd3;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      padding: 0.74rem 2.25rem 0.74rem 1rem;
    }

    .viewer-wrap {
      position: relative;
      min-height: 68vh;
      border-radius: 30px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 72vh;
      border: 0;
      background: white;
    }

    .hint {
      width: min(1180px, 100%);
      margin: 0 auto;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 820px) {
      body {
        padding: 0.6rem;
      }

      .shell {
        grid-template-rows: auto minmax(70vh, 1fr);
      }

      .toolbar {
        grid-template-columns: 1fr;
        border-radius: 22px;
      }

      .controls {
        justify-content: stretch;
      }

      button,
      .open-link,
      select {
        flex: 1 1 100%;
        text-align: center;
        justify-content: center;
      }

      .viewer-wrap {
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Tommy's gift webpage viewer">
    <section class="toolbar" aria-label="Website navigation">
      <div class="brand">
        <p class="eyebrow">Tommy's gift</p>
        <h1 id="pageTitle">Birthday website</h1>
        <p class="page-meta"><span id="counter">1 / 1</span> · use Back and Forward to switch pages</p>
      </div>

      <label class="selector" aria-label="Choose a page">
        <select id="pageSelect"></select>
      </label>

      <nav class="controls" aria-label="Page controls">
        <button type="button" id="backBtn">← Back</button>
        <button type="button" id="forwardBtn">Forward →</button>
        <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener">Open page</a>
      </nav>
    </section>

    <section class="viewer-wrap" aria-live="polite">
      <iframe id="viewer" title="Selected gift page"></iframe>
    </section>
  </main>

  <p class="hint">Hosted as a static site: no build step required, just publish this repository on Render.</p>

  <script>
    const pages = [
      { title: "Birthday Site", file: "tommy_birthday_site_v2 (1).html" },
      { title: "100 Things Mei Loves About You", file: "100_things_mei_loves_about_you (1).html" },
      { title: "Contract", file: "HAAPYY BIRTHDAYYY I LOVE UUUU SOO MUCHHHH.html" },
      { title: "TOMMYYYYYY", file: "TOMMYYYYYY.html" },
      { title: "Strelitzia", file: "strelitzia (1).html" },
      { title: "For Tommy | 17", file: "tommy baby.html" },
      { title: "17 Fragments", file: "tommy is the besttt.html" }
    ];

    const pageTitle = document.getElementById("pageTitle");
    const counter = document.getElementById("counter");
    const pageSelect = document.getElementById("pageSelect");
    const viewer = document.getElementById("viewer");
    const backBtn = document.getElementById("backBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const openLink = document.getElementById("openLink");

    let currentIndex = 0;

    function encodedFile(file) {
      return file.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    function renderOptions() {
      pages.forEach((page, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = page.title;
        pageSelect.appendChild(option);
      });
    }

    function showPage(index, updateHash = true) {
      currentIndex = Math.max(0, Math.min(index, pages.length - 1));
      const page = pages[currentIndex];
      const src = encodedFile(page.file);

      pageTitle.textContent = page.title;
      counter.textContent = `${currentIndex + 1} / ${pages.length}`;
      pageSelect.value = String(currentIndex);
      viewer.src = src;
      openLink.href = src;
      backBtn.disabled = currentIndex === 0;
      forwardBtn.disabled = currentIndex === pages.length - 1;

      if (updateHash) {
        history.replaceState(null, "", `#page-${currentIndex + 1}`);
      }
    }

    function pageFromHash() {
      const match = window.location.hash.match(/^#page-(\d+)$/);
      if (!match) return 0;
      return Number(match[1]) - 1;
    }

    backBtn.addEventListener("click", () => showPage(currentIndex - 1));
    forwardBtn.addEventListener("click", () => showPage(currentIndex + 1));
    pageSelect.addEventListener("change", (event) => showPage(Number(event.target.value)));
    window.addEventListener("hashchange", () => showPage(pageFromHash(), false));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" && currentIndex > 0) showPage(currentIndex - 1);
      if (event.key === "ArrowRight" && currentIndex < pages.length - 1) showPage(currentIndex + 1);
    });

    renderOptions();
    showPage(pageFromHash());
  </script>
</body>
</html>
