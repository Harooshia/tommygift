<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INVENTORY // STRELITZIA_02</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* Franxx UI Container */
        .franxx-frame {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            width: 380px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 68, 0.15);
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        /* Red Accent Bars */
        .accent {
            position: absolute;
            background: #ff0044;
            height: 3px;
            width: 60px;
        }
        .top-left { top: 0; left: 20%; }
        .bottom-right { bottom: 0; right: 20%; }

        .flower-container {
            text-align: center;
            position: relative;
            margin: 20px 0;
        }

        .flower-img {
            width: 240px;
            /* This makes the white background of the image blend into the dark UI */
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.1) drop-shadow(0 0 15px rgba(255, 0, 68, 0.3));
            animation: sync-pulse 5s ease-in-out infinite;
        }

        @keyframes sync-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.4); }
        }

        .status-header {
            font-size: 0.6em;
            letter-spacing: 5px;
            color: #ff0044;
            margin-bottom: 25px;
            text-align: left;
            text-transform: uppercase;
        }

        .item-name {
            font-size: 1.8em;
            letter-spacing: 12px;
            margin: 15px 0;
            text-transform: uppercase;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .meaning {
            border-left: 2px solid #ff0044;
            padding-left: 15px;
            font-size: 0.85em;
            line-height: 1.8;
            color: #aaa;
            text-align: left;
            margin-top: 30px;
            font-family: sans-serif;
            font-style: italic;
        }

        .sync-rate {
            margin-top: 30px;
            font-size: 0.7em;
            color: #333;
            display: flex;
            justify-content: space-between;
            letter-spacing: 2px;
        }

        .mei-signature {
            position: absolute;
            bottom: 12px;
            right: 40px;
            font-size: 0.5em;
            color: #222;
            letter-spacing: 3px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="franxx-frame">
        <div class="accent top-left"></div>
        <div class="accent bottom-right"></div>

        <div class="status-header">Pistil: MEI // Stamen: TOMMY</div>

        <div class="flower-container">
            <img src="flower.jpg" class="flower-img" alt="Strelitzia Flower">
        </div>

        <div class="item-name">Strelitzia</div>

        <div class="meaning">
            "The Jian is a bird that only has one wing. Unless a male and a female pair up and support each other, they cannot fly. I found my other wing in you. We will never drift apart, Tommy."
        </div>

        <div class="sync-rate">
            <span>SYNC RATE: 100%</span>
            <span>CHAPTER: 17</span>
        </div>

        <div class="mei-signature">AUTHENTICATED BY MEI</div>
    </div>

</body>
</html>
