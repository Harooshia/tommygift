<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Tommy | 17</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Georgia', serif; background: #000; }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('assets/cityscape.svg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #sprite-container {
            position: absolute;
            bottom: 0;
            height: 92%;
            display: flex;
            justify-content: center;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            opacity: 0;
        }

        #sprite-container img { height: 100%; object-fit: contain; }

        #dialogue-box {
            position: absolute;
            bottom: 40px;
            width: 90%;
            max-width: 700px;
            height: 180px;
            background: rgba(5, 5, 10, 0.9);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 35px;
            box-sizing: border-box;
            cursor: pointer;
            color: #fff;
            display: none;
            z-index: 10;
            border-radius: 2px;
        }

        #name-tag {
            position: absolute;
            top: -15px;
            left: 20px;
            color: #fff;
            font-size: 0.7em;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: bold;
            background: #000;
            padding: 2px 15px;
        }

        #text-content { 
            font-size: 1.1em; 
            line-height: 1.8;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 2s ease;
        }

        .intro-text {
            color: #fff;
            font-size: 0.9em;
            letter-spacing: 12px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 3s forwards;
            text-align: center;
        }

        button {
            padding: 15px 45px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 1.5s;
            letter-spacing: 8px;
            font-size: 0.7em;
            opacity: 0;
            animation: fadeIn 3s forwards 1.5s;
        }

        button:hover { background: #fff; color: #000; border-color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .click-hint {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 0.6em;
            letter-spacing: 3px;
            opacity: 0.4;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.5; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

<audio id="bgm" loop>
    <source src="https://files.catbox.moe/p4p8ly.mp3" type="audio/mpeg">
</audio>

<div id="game-container">
    <div id="start-screen">
        <div class="intro-text">THROUGH THE GLASS<br><br>AND INTO THE SKY</div>
        <button onclick="startGame()">BEGIN</button>
    </div>

    <div id="sprite-container">
        <img src="assets/mai.svg" alt="Mai Sakurajima">
    </div>

    <div id="dialogue-box" onclick="nextLine()">
        <div id="name-tag">Mai Sakurajima</div>
        <div id="text-content"></div>
        <div class="click-hint">▼</div>
    </div>
</div>

<script>
    const story = [
        { text: "The sky tonight... it’s the same one that looked down on the world when you were born in 2009." },
        { text: "But the world itself is different now. Because you're in it." },
        { text: "17 years of breathing, dreaming, and finding your way through the noise." },
        { text: "Sometimes it’s easy to feel like just another person under these stars..." },
        { text: "But to me, Tommy, you are the horizon. The place where my world begins and ends." },
        { text: "You aren't just important; you're the reason this specific 'everyday' feels so wonderful." },
        { text: "I want you to hold onto that. Even when things feel heavy or out of reach." },
        { text: "You have a light in you that no one else can replicate. I hope you see it too." },
        { text: "So, let's keep going. One step at a time, into this new year of yours." },
        { text: "Happy 17th Birthday, Tommy. Thank you for being you. ❤️" }
    ];

    let currentLine = 0;
    const textElement = document.getElementById('text-content');
    const spriteContainer = document.getElementById('sprite-container');
    const audio = document.getElementById('bgm');

    function startGame() {
        document.getElementById('start-screen').style.opacity = '0';
        audio.volume = 0.3;
        audio.play();
        setTimeout(() => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('dialogue-box').style.display = 'block';
            spriteContainer.style.opacity = '1';
        }, 2000);
        nextLine();
    }

    function nextLine() {
        if (currentLine < story.length) {
            textElement.innerHTML = story[currentLine].text;
            currentLine++;
        }
    }
</script>

</body>
</html>
